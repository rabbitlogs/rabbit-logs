pdt6jm>&times;</button> </div> <div class="search-results" data-search-results data-astro-cid-otpdt6jm> <p class="search-hint" data-astro-cid-otpdt6jm>검색어를 입력해 보세요.</p> </div> </div> </div> <script>(function(){const emptyMsg = "검색어를 입력해 보세요.";
const noResultMsg = "검색 결과가 없습니다.";
const lang = "ko";

  (function () {
    const openBtns = document.querySelectorAll('[data-search-open]');
    const modal = document.querySelector('[data-search-modal]');
    const closeBtn = document.querySelector('[data-search-close]');
    const input = document.querySelector('[data-search-input]');
    const results = document.querySelector('[data-search-results]');
    if (!modal || !input) return;

    let pagefind = null;
    let pagefindLoading = null;

    // Pagefind는 빌드 후에만 /pagefind/pagefind.js 가 생성된다.
    // 검색창을 처음 열 때 한 번만 불러온다(초기 페이지 로드 속도에 영향 없게).
    function loadPagefind() {
      if (pagefind) return Promise.resolve(pagefind);
      if (pagefindLoading) return pagefindLoading;
      pagefindLoading = import('/pagefind/pagefind.js')
        .then((mod) => {
          pagefind = mod;
          return pagefind;
        })
        .catch(() => null); // 로컬 미리보기 등 색인이 없을 때 조용히 무시
      return pagefindLoading;
    }

    const open = () => {
      modal.classList.add('is-open');
      document.body.style.overflow = 'hidden';
      loadPagefind();
      setTimeout(() => input.focus(), 50);
    };
    const close = () => {
      modal.classList.remove('is-open');
      document.body.style.overflow = '';
      input.value = '';
      results.innerHTML = '<p class="search-hint">' + emptyMsg + '</p>';
    };

    openBtns.forEach((b) => b.addEventListener('click', open));
    if (closeBtn) closeBtn.addEventListener('click', close);
    modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('is-open')) close();
    });

    const render = async (hits) => {
      if (!hits.length) {
        results.innerHTML = '<p class="search-hint">' + noResultMsg + '</p>';
        return;
      }
      // Pagefind 검색 결과(hits)는 기본적으로 url이 없고 data()를 호출해야 얻을 수 있다.
      // 그래서 먼저 데이터를 불러온 뒤, 그 안의 url로 언어를 거른다.
      const allItems = await Promise.all(hits.slice(0, 20).map((h) => h.data()));
      const items = allItems
        .filter((d) => d && d.url)
        .filter((d) => (lang === 'en' ? d.url.includes('/en/') : !d.url.includes('/en/')))
        .slice(0, 8);

      if (!items.length) {
        results.innerHTML = '<p class="search-hint">' + noResultMsg + '</p>';
        return;
      }

      results.innerHTML = items.map((d) => {
        const title = d.meta && d.meta.title ? d.meta.title : d.url;
        const excerpt = d.excerpt || '';
        return (
          '<a class="search-result" href="' + d.url + '">' +
          '<span class="search-result-title">' + title + '</span>' +
          '<span class="search-result-excerpt">' + excerpt + '</span>' +
          '</a>'
        );
      }).join('');
    };

    let timer = null;
    input.addEventListener('input', () => {
      clearTimeout(timer);
      const q = input.value.trim();
      if (!q) { results.innerHTML = '<p class="search-hint">' + emptyMsg + '</p>'; return; }
      timer = setTimeout(async () => {
        const pf = await loadPagefind();
        if (!pf) { results.innerHTML = '<p class="search-hint">' + noResultMsg + '</p>'; return; }
        const search = await pf.search(q);
        render(search.results);
      }, 250);
    });

        let showTags = false;
        let sim, node, link, label, curNodes, curEdges, curNodesById;
        const NODE_R = 6.5; // 노드 반지름 (작게)
        const TAG_R = 4.5;

        function buildGraph(withTags) {
          showTags = withTags;
          g.selectAll('*').remove();
          if (sim) sim.stop();

          curNodes = withTags ? RAW.nodes.map((n) => ({ ...n })) : postNodes.map((n) => ({ ...n }));
          curEdges = withTags ? RAW.edges : postEdges;
          curNodesById = {};
          curNodes.forEach((n) => (curNodesById[n.id] = n));

          const linkObjs = curEdges.map((e) => ({ source: e.s, target: e.t, type: e.type }));

          // 옵시디언처럼 유기적으로 퍼지되 너무 흩어지지 않도록: 짧은 링크 거리 + 적당한 반발력
          sim = d3
            .forceSimulation(curNodes)
            .force(
              'link',
              d3
                .forceLink(linkObjs)
                .id((d) => d.id)
                .distance((d) => (d.type === 'tag' ? 30 : d.type === 'prerequisite' ? 46 : 58))
                .strength((d) => (d.type === 'tag' ? 0.4 : 0.7))
            )
            .force('charge', d3.forceManyBody().strength((d) => (d.isTag ? -40 : -140)))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collide', d3.forceCollide().radius((d) => (d.isTag ? TAG_R + 18 : NODE_R + 30)))
            .force('x', d3.forceX(width / 2).strength(0.05))
            .force('y', d3.forceY(height / 2).strength(0.05));

          link = g
            .append('g')
            .selectAll('line')
            .data(linkObjs)
            .join('line')
            .attr('stroke', (d) => edgeStyle[d.type].color)
            .attr('stroke-width', (d) => edgeStyle[d.type].width)
            .attr('stroke-dasharray', (d) => edgeStyle[d.type].dash)
            .attr('marker-end', (d) => (edgeStyle[d.type].arrow ? 'url(#arrow)' : null));

          const nodeGroup = g.append('g').selectAll('.node-g').data(curNodes).join('g').attr('class', 'node-g');

          node = nodeGroup
            .append('circle')
            .attr('r', (d) => (d.isTag ? TAG_R : NODE_R))
            .attr('fill', (d) => (d.isTag ? '#9b7fa6' : catColor[d.category]))
            .attr('fill-opacity', (d) => (d.isTag ? 0.55 : 1))
            .attr('stroke', '#fff')
            .attr('stroke-width', 1.2)
            .style('cursor', 'pointer')
            .call(drag(sim));

          // 글 제목은 노드 아래, 짧은 표시용 제목 사용 (전체 제목은 호버 시 네이티브 툴팁)
          label = nodeGroup
            .append('text')
            .attr('class', (d) => (d.isTag ? 'tag-label' : 'node-label'))
            .attr('text-anchor', 'middle')
            .attr('dy', (d) => (d.isTag ? TAG_R + 11 : NODE_R + 11))
            .text((d) => (d.isTag ? '#' + d.title : d.displayTitle));

          node.append('title').text((d) => (d.isTag ? '#' + d.title : d.title));

          function neighbors(id) {
            const s = new Set([id]);
            curEdges.forEach((e) => {
              if (e.s === id) s.add(e.t);
              if (e.t === id) s.add(e.s);
            });
            return s;
          }

          function highlight(id) {
            const nb = neighbors(id);
            node.classed('dim', (n) => !nb.has(n.id));
            label.classed('dim', (n) => !nb.has(n.id));
            link
              .classed('dim', (l) => {
                const sId = l.source.id || l.source;
                const tId = l.target.id || l.target;
                return !(sId === id || tId === id);
              })
              .style('display', (l) => {
                if (l.type !== 'related') return null;
                const sId = l.source.id || l.source;
                const tId = l.target.id || l.target;
                return sId === id || tId === id ? null : 'none';
              });
          }

          // 터치 기기(모바일)인지: hover가 안 되는 환경
          const isTouch = window.matchMedia && window.matchMedia('(hover: none)').matches;
          let touchActiveId = null;

          if (isTouch) {
            // 모바일: 1차 터치=강조만, 같은 노드 2차 터치=이동
            nodeGroup.on('click', (ev, d) => {
              ev.stopPropagation();
              if (d.isTag) {
                highlight(d.id);
                touchActiveId = d.id;
                return;
              }
              if (touchActiveId === d.id) {
                window.location.href = `/blog/${d.id}`;
              } else {
                highlight(d.id);
                touchActiveId = d.id;
              }
            });
          } else {
            // PC: 마우스 오버=강조, 클릭=바로 이동
            nodeGroup
              .on('mouseenter', (ev, d) => highlight(d.id))
              .on('mouseleave', () => applyFilters())
              .on('click', (ev, d) => {
                ev.stopPropagation();
                if (!d.isTag) window.location.href = `/blog/${d.id}`;
              });
          }

          svg.on('click.touchreset', () => {
            touchActiveId = null;
            applyFilters();
          });

          sim.on('tick', () => {
            link
              .attr('x1', (d) => d.source.x)
              .attr('y1', (d) => d.source.y)
              .attr('x2', (d) => d.target.x)
              .attr('y2', (d) => d.target.y);
            nodeGroup.attr('transform', (d) => `translate(${d.x},${d.y})`);
          });

          sim.alpha(1).restart();
          applyFilters();
        }

        document.querySelectorAll('.chip[data-cat]').forEach((chip) => {
          chip.addEventListener('click', () => {
            document.querySelectorAll('.chip[data-cat]').forEach((c) => c.classList.remove('active'));
            chip.classList.add('active');
            activeCat = chip.dataset.cat;
            applyFilters();
          });
        });

        document.getElementById('tag-toggle').addEventListener('click', (ev) => {
          const next = !showTags;
          ev.currentTarget.textContent = next ? '− 태그' : '+ 태그';
          ev.currentTarget.classList.toggle('active', next);
          buildGraph(next);
        });

        function applyFilters() {
          // 태그는 활성 카테고리 글과 실제로 연결된 것만 보이게(전체일 땐 다 보임)
          let visibleTagIds = null;
          if (activeCat !== 'all') {
            visibleTagIds = new Set();
            curEdges.forEach((e) => {
              if (e.type !== 'tag') return;
              const postId = String(e.s).startsWith('#') ? e.t : e.s;
              const tagId = String(e.s).startsWith('#') ? e.s : e.t;
              const postNode = curNodesById[postId];
              if (postNode && postNode.category === activeCat) visibleTagIds.add(tagId);
            });
          }

          const catOk = (d) => {
            if (!d) return false;
            if (activeCat === 'all') return true;
            if (d.isTag) return visibleTagIds ? visibleTagIds.has(d.id) : true;
            return d.category === activeCat;
          };

          node.classed('dim', (d) => !catOk(d));
          label.classed('dim', (d) => !catOk(d));
          link
            .style('display', (d) => (d.type === 'related' ? 'none' : null))
            .classed('dim', (d) => {
              const sId = d.source.id || d.source;
              const tId = d.target.id || d.target;
              const sNode = curNodesById[sId];
              const tNode = curNodesById[tId];
              return !catOk(sNode) || !catOk(tNode);
            });
        }

        function drag(simulation) {
          function started(ev, d) {
            if (!ev.active) simulation.alphaTarget(0.2).restart();
            d.fx = d.x;
            d.fy = d.y;
          }
          function dragged(ev, d) {
            d.fx = ev.x;
            d.fy = ev.y;
          }
          function ended(ev, d) {
            if (!ev.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
          }
          return d3.drag().on('start', started).on('drag', dragged).on('end', ended);
        }

        buildGraph(false);

        window.addEventListener('resize', () => {
          width = stage.clientWidth;
          height = stage.clientHeight;
          sim.force('center', d3.forceCenter(width / 2, height / 2));
          sim.alpha(0.3).restart();
        });
      } // boot 끝

      // d3 로드 대기 후 부팅 (DOM 준비도 함께 보장)
      var tries = 0;
      function waitAndBoot() {
        var domReady = document.readyState !== 'loading';
        if (typeof d3 !== 'undefined' && domReady) { boot(); return; }
        if (tries++ < 80) { setTimeout(waitAndBoot, 50); return; }
        boot(); // 마지막 시도 (에러 메시지 목적)
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', waitAndBoot);
      } else {
        waitAndBoot();
      }
    })();
  </script>  </main> <footer class="site-footer"><div class="wrap"> <nav class="footer-links"> <a href="/about">소개 &amp; 문의</a> <a href="/privacy">개인정보처리방침</a> <a href="/terms">이용약관</a> </nav> <p>Hop! Log! Repeat! · © 2025 Rabbit Logs</p> </div></footer>  </body> </html>
